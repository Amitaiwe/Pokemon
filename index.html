<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéMon ForEveR</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
:root {
  --red: #e3350d;
  --dark-red: #9b1a00;
  --yellow: #f5c518;
  --blue: #2a75bb;
  --dark: #1a1a2e;
  --darker: #0f0f1a;
  --panel: rgba(20,20,40,0.92);
  --panel-border: rgba(255,255,255,0.12);
  --text: #f0f0f0;
  --text-muted: #aaa;
  --green: #4caf50;
  --hp-high: #4caf50;
  --hp-mid: #ff9800;
  --hp-low: #f44336;
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--darker);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
}

/* ===== AUTH SCREEN ===== */
#authScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%);
  gap: 28px;
}

.auth-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(18px, 4vw, 36px);
  color: var(--yellow);
  text-shadow: 0 0 20px rgba(245,197,24,0.6), 4px 4px 0 var(--dark-red);
  text-align: center;
  line-height: 1.6;
  animation: titlePulse 2s ease-in-out infinite alternate;
}

@keyframes titlePulse {
  from { text-shadow: 0 0 20px rgba(245,197,24,0.4), 4px 4px 0 var(--dark-red); }
  to { text-shadow: 0 0 40px rgba(245,197,24,0.9), 4px 4px 0 var(--dark-red); }
}

.pokeball-logo {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: linear-gradient(180deg, var(--red) 50%, white 50%);
  border: 6px solid #222;
  position: relative;
  animation: rotateBall 3s linear infinite;
  box-shadow: 0 0 40px rgba(227,53,13,0.5);
}

.pokeball-logo::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 30px; height: 30px;
  background: white;
  border-radius: 50%;
  border: 6px solid #222;
  z-index: 2;
}

.pokeball-logo::after {
  content: '';
  position: absolute;
  top: calc(50% - 3px);
  left: 0; right: 0;
  height: 6px;
  background: #222;
}

@keyframes rotateBall {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.btn-google {
  background: white;
  color: #333;
  border: none;
  padding: 14px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }

/* ===== SETUP SCREEN ===== */
#setupScreen {
  display: none;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%);
  padding: 30px 20px;
  gap: 24px;
}

.setup-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 2.5vw, 20px);
  color: var(--yellow);
  text-align: center;
}

.setup-section {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 16px;
  padding: 20px;
  width: 100%;
  max-width: 680px;
}

.setup-section h3 {
  font-size: 18px;
  color: var(--yellow);
  margin-bottom: 16px;
  text-align: center;
}

.trainer-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.trainer-card {
  background: rgba(255,255,255,0.06);
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 12px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.trainer-card:hover { border-color: var(--yellow); background: rgba(245,197,24,0.1); }
.trainer-card.selected { border-color: var(--yellow); background: rgba(245,197,24,0.2); box-shadow: 0 0 16px rgba(245,197,24,0.3); }

.trainer-card img { width: 64px; height: 64px; image-rendering: pixelated; }
.trainer-card span { display: block; font-size: 13px; font-weight: 700; margin-top: 6px; }

.starter-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.starter-card {
  background: rgba(255,255,255,0.06);
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 12px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.starter-card:hover { border-color: var(--blue); background: rgba(42,117,187,0.1); }
.starter-card.selected { border-color: var(--blue); background: rgba(42,117,187,0.2); box-shadow: 0 0 16px rgba(42,117,187,0.3); }

.starter-card img { width: 72px; height: 72px; image-rendering: pixelated; }
.starter-card .s-name { font-size: 12px; font-weight: 700; margin-top: 4px; }
.starter-card .s-type { font-size: 11px; color: var(--text-muted); }

.btn-start {
  background: linear-gradient(135deg, var(--red), var(--dark-red));
  color: white;
  border: none;
  padding: 16px 48px;
  border-radius: 50px;
  font-size: 18px;
  font-family: 'Heebo', sans-serif;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(227,53,13,0.4);
  transition: all 0.2s;
  letter-spacing: 1px;
}

.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(227,53,13,0.6); }
.btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ===== MAIN GAME SCREEN ===== */
#gameScreen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
}

/* TOP BAR */
.top-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--panel-border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 1.5vw, 13px);
  color: var(--yellow);
}

.trainer-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.trainer-avatar-small {
  width: 40px; height: 40px;
  image-rendering: pixelated;
  border-radius: 50%;
  border: 2px solid var(--yellow);
}

.trainer-name-display { font-size: 14px; font-weight: 700; }

.gym-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--yellow);
}

.top-bar-actions {
  display: flex;
  gap: 8px;
}

.btn-small {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid var(--panel-border);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-small:hover { background: rgba(255,255,255,0.2); }

/* WORLD MAP */
.world-container {
  flex: 1;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 4px;
}

.world-map {
  position: relative;
  width: 100%;
  max-width: 100%;
}

.map-bg {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
  box-shadow: var(--shadow);
}

.zone-grid {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
}

.zone {
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  border-radius: 4px;
}

.zone:hover { background: rgba(255,255,255,0.12); }
.zone:active { background: rgba(255,255,255,0.22); }

.zone-label {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: white;
  font-size: clamp(10px, 1.5vw, 14px);
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 10px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}

.zone:hover .zone-label { opacity: 1; }

/* TEAM PANEL */
.team-panel {
  background: var(--panel);
  border-top: 1px solid var(--panel-border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.team-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--yellow);
  white-space: nowrap;
}

.team-slots {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.team-slot {
  width: 52px; height: 52px;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: visible;
}

.team-slot:hover { border-color: var(--yellow); }
.team-slot img { width: 44px; height: 44px; image-rendering: pixelated; }
.team-slot .slot-hp-bar {
  position: absolute;
  bottom: -4px;
  left: 2px; right: 2px;
  height: 3px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  overflow: hidden;
}
.team-slot .slot-hp-fill {
  height: 100%;
  background: var(--hp-high);
  border-radius: 2px;
  transition: width 0.3s;
}

.team-slot .slot-level {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--dark);
  color: var(--yellow);
  font-size: 9px;
  font-weight: 900;
  padding: 1px 4px;
  border-radius: 6px;
  border: 1px solid var(--yellow);
}

.bottom-bar {
  background: var(--panel);
  border-top: 1px solid var(--panel-border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.pokeball-counter {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
}

.pokeball-icon {
  width: 24px; height: 24px;
  background: linear-gradient(180deg, var(--red) 50%, white 50%);
  border-radius: 50%;
  border: 2px solid #444;
  position: relative;
  display: inline-block;
}

.btn-gym {
  background: linear-gradient(135deg, #7b2d8b, #4a1a6e);
  color: white;
  border: none;
  padding: 10px 22px;
  border-radius: 20px;
  font-size: 14px;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(123,45,139,0.4);
  transition: all 0.2s;
}

.btn-gym:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123,45,139,0.6); }

/* ===== OVERLAYS ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 16px;
  display: none;
}

.overlay.active { display: flex; }

/* ===== BATTLE SCREEN ===== */
#battleOverlay {
  background: radial-gradient(ellipse, #1a2a1a 0%, #0a0a0a 100%);
}

.battle-container {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.battle-field {
  background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 40%, #3a2a1a 40%, #2a1a0a 100%);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  min-height: 220px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

.battle-pokemon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.battle-pokemon.enemy {
  margin-bottom: 40px;
}

.battle-pokemon img {
  width: clamp(80px, 15vw, 130px);
  height: clamp(80px, 15vw, 130px);
  image-rendering: pixelated;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
}

.battle-pokemon.enemy img { transform: scaleX(-1); }

.battle-types {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 3px 0;
}

.battle-types .type-badge {
  font-size: 10px;
  padding: 2px 7px;
}

.battle-hp-block {
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
  padding: 8px 12px;
  min-width: 140px;
  border: 1px solid rgba(255,255,255,0.1);
}

.battle-hp-name { font-size: 13px; font-weight: 700; }
.battle-hp-level { font-size: 11px; color: var(--text-muted); }

.battle-hp-bar-wrap {
  margin-top: 6px;
  height: 8px;
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  overflow: hidden;
}

.battle-hp-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease, background 0.4s;
}

.battle-log {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 12px;
  padding: 14px 16px;
  min-height: 64px;
  font-size: 15px;
  line-height: 1.5;
}

.battle-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-battle {
  padding: 13px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-battle:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-battle:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-attack { background: linear-gradient(135deg, #e3350d, #9b1a00); color: white; }
.btn-special { background: linear-gradient(135deg, #2a75bb, #1a4a80); color: white; }
.btn-run { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
.btn-catch { background: linear-gradient(135deg, var(--yellow), #c49a00); color: #222; }
.btn-release { background: linear-gradient(135deg, #4caf50, #2e7d32); color: white; }

/* ===== POKEMON CARD POPUP ===== */
.pokemon-card-popup {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  max-width: 340px;
  width: 100%;
  box-shadow: var(--shadow);
  position: relative;
}

.card-close {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-sprite { text-align: center; margin-bottom: 12px; }
.card-sprite img { width: 100px; height: 100px; image-rendering: pixelated; }

.card-name {
  text-align: center;
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 8px;
}

.card-types {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.type-badge {
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}

.card-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.stat-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-label { font-size: 11px; color: var(--text-muted); }
.stat-value { font-size: 15px; font-weight: 700; }

.stat-bar-wrap {
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 2px;
}

.stat-bar-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 2px;
}

.xp-row {
  margin-bottom: 14px;
}

.xp-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.xp-bar-wrap { height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
.xp-bar-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ffa500); border-radius: 4px; transition: width 0.3s; }

.card-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card-actions .btn-battle { width: 100%; }

/* ===== PC STORAGE OVERLAY ===== */
.pc-container {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  max-width: 680px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  position: relative;
}

.pc-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--yellow);
  margin-bottom: 20px;
  text-align: center;
}

.pc-close {
  position: absolute;
  top: 16px;
  left: 16px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
}

.pc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 10px;
}

.pc-pokemon-item {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.pc-pokemon-item:hover { border-color: var(--blue); background: rgba(42,117,187,0.1); }
.pc-pokemon-item img { width: 56px; height: 56px; image-rendering: pixelated; }
.pc-pokemon-item .pc-name { font-size: 11px; font-weight: 700; margin-top: 4px; }
.pc-pokemon-item .pc-level { font-size: 10px; color: var(--text-muted); }

/* ===== GYM SCREEN ===== */
.gym-container {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  max-width: 500px;
  width: 100%;
  box-shadow: var(--shadow);
}

.gym-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: #d070ff;
  text-align: center;
  margin-bottom: 8px;
}

.gym-subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }

.gym-leader-info {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 20px;
}

.gym-leader-sprite { font-size: 48px; }
.gym-leader-name { font-size: 18px; font-weight: 900; }
.gym-leader-type { font-size: 13px; color: var(--text-muted); }

.gym-team-preview {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 20px;
}

.gym-poke-badge {
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
}

.gym-actions { display: flex; gap: 10px; flex-direction: column; }

/* ===== ENCOUNTER RESULT ===== */
.encounter-result {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow);
}

.encounter-result h2 { font-size: 22px; font-weight: 900; margin-bottom: 16px; color: var(--yellow); }

/* ===== NOTIFICATION TOAST ===== */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(20,20,40,0.95);
  border: 1px solid var(--panel-border);
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 700;
  z-index: 9999;
  transition: transform 0.3s;
  text-align: center;
  max-width: 90vw;
  pointer-events: none;
}

#toast.show { transform: translateX(-50%) translateY(0); }

/* ===== EVOLUTION OVERLAY ===== */
#evolutionOverlay {
  background: radial-gradient(ellipse, #0a0a2e 0%, #000005 100%);
  overflow: hidden;
}

#evolutionOverlay::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 50%, rgba(120,80,255,0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255,200,50,0.1) 0%, transparent 40%);
  pointer-events: none;
  animation: evoBackground 3s ease-in-out infinite alternate;
}

@keyframes evoBackground {
  from { opacity: 0.5; }
  to { opacity: 1; }
}

.evolution-container {
  text-align: center;
  padding: 30px 20px;
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 420px;
}

.evo-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(11px, 2.5vw, 16px);
  color: var(--yellow);
  margin-bottom: 24px;
  text-shadow: 0 0 20px rgba(245,197,24,0.8);
  animation: titleFlicker 0.5s ease-in-out infinite alternate;
}

@keyframes titleFlicker {
  from { opacity: 0.85; text-shadow: 0 0 10px rgba(245,197,24,0.5); }
  to { opacity: 1; text-shadow: 0 0 30px rgba(245,197,24,1), 0 0 60px rgba(245,197,24,0.4); }
}

.evolution-imgs {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 24px;
  position: relative;
}

.evo-sprite-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.evo-sprite-wrap span {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 700;
  text-transform: capitalize;
}

.evo-sprite-old {
  animation: evoOldPulse 0.6s ease-in-out infinite alternate;
}

.evo-sprite-new {
  animation: evoNewAppear 0.8s ease-out forwards, evoNewGlow 1s ease-in-out 0.8s infinite alternate;
  opacity: 0;
}

@keyframes evoOldPulse {
  from { filter: brightness(1) drop-shadow(0 0 8px white); transform: scale(1); }
  to { filter: brightness(2) drop-shadow(0 0 25px white) saturate(0); transform: scale(1.05); }
}

@keyframes evoNewAppear {
  0% { opacity: 0; transform: scale(0.3) rotate(-10deg); filter: brightness(3) saturate(0); }
  60% { opacity: 1; transform: scale(1.15) rotate(3deg); filter: brightness(2) saturate(0.5); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); filter: brightness(1) saturate(1); }
}

@keyframes evoNewGlow {
  from { filter: drop-shadow(0 0 12px #aaf) brightness(1.1); }
  to { filter: drop-shadow(0 0 30px #88f) brightness(1.3); }
}

.evo-sprite-old img,
.evo-sprite-new img {
  width: clamp(90px, 20vw, 130px);
  height: clamp(90px, 20vw, 130px);
  image-rendering: pixelated;
}

.evo-arrow-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.evo-arrow {
  font-size: 32px;
  color: var(--yellow);
  animation: arrowPulse 0.6s ease-in-out infinite alternate;
}

@keyframes arrowPulse {
  from { transform: translateX(0); opacity: 0.6; }
  to { transform: translateX(6px); opacity: 1; }
}

.evo-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.evo-particle {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--yellow);
  animation: particleFly var(--dur, 1.5s) ease-out var(--delay, 0s) infinite;
  opacity: 0;
}

@keyframes particleFly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx, 60px), var(--ty, -80px)) scale(0); opacity: 0; }
}

.evo-name-reveal {
  font-size: clamp(18px, 5vw, 28px);
  font-weight: 900;
  color: white;
  text-shadow: 0 0 20px rgba(150,150,255,0.8);
  animation: nameReveal 0.5s ease-out 1.2s both;
  margin-bottom: 8px;
  text-transform: capitalize;
}

@keyframes nameReveal {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.evo-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  animation: nameReveal 0.5s ease-out 1.5s both;
}

/* ===== SWITCH POKEMON POPUP ===== */
.switch-popup {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 20px;
  max-width: 380px;
  width: 100%;
  box-shadow: var(--shadow);
}

.switch-popup-title {
  font-size: 16px;
  font-weight: 900;
  color: var(--yellow);
  text-align: center;
  margin-bottom: 16px;
}

.switch-pokemon-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
}

.switch-pokemon-btn {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;

}

.switch-pokemon-btn:hover { border-color: var(--yellow); background: rgba(245,197,24,0.1); }

.switch-pokemon-btn img { width: 48px; height: 48px; image-rendering: pixelated; flex-shrink: 0; }

.switch-poke-info { flex: 1; }
.switch-poke-name { font-size: 14px; font-weight: 700; text-transform: capitalize; }
.switch-poke-level { font-size: 12px; color: var(--text-muted); }
.switch-poke-hp { font-size: 11px; margin-top: 4px; }
.switch-hp-bar { height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin-top: 3px; overflow: hidden; }
.switch-hp-fill { height: 100%; border-radius: 2px; }

/* ===== LEVEL UP TOAST ===== */
.levelup-toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: linear-gradient(135deg, #1a1a3e, #2a1a5e);
  border: 2px solid var(--yellow);
  border-radius: 20px;
  padding: 20px 32px;
  text-align: center;
  z-index: 9998;
  box-shadow: 0 0 40px rgba(245,197,24,0.4), var(--shadow);
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  opacity: 0;
  min-width: 220px;
}

.levelup-toast.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

.levelup-toast.hide {
  transform: translate(-50%, -50%) scale(0.8);
  opacity: 0;
}

.levelup-poke-name { font-size: 13px; color: var(--text-muted); text-transform: capitalize; margin-bottom: 4px; }
.levelup-text { font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--yellow); text-shadow: 0 0 12px rgba(245,197,24,0.8); }
.levelup-number { font-size: 36px; font-weight: 900; color: white; line-height: 1.1; margin: 4px 0; }
.levelup-stars { font-size: 20px; animation: starSpin 1s linear infinite; display: inline-block; }
@keyframes starSpin { to { transform: rotate(360deg); } }

/* ===== BATTLE ANIMATIONS ===== */
@keyframes battleFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

@keyframes battleBob {
  0%, 100% { transform: translateY(0px) scaleX(-1); }
  50% { transform: translateY(-4px) scaleX(-1); }
}

.battle-pokemon.player img { animation: battleFloat 2s ease-in-out infinite; }
.battle-pokemon.enemy img { animation: battleBob 2.5s ease-in-out infinite; }

/* ===== TYPE COLORS ===== */
.type-fire { background: #ff6b35; color: white; }
.type-water { background: #4a90d9; color: white; }
.type-grass { background: #4caf50; color: white; }
.type-electric { background: #f5c518; color: #333; }
.type-ice { background: #7ecfcf; color: #333; }
.type-psychic { background: #db7aa8; color: white; }
.type-ghost { background: #705898; color: white; }
.type-dragon { background: #6f35fc; color: white; }
.type-dark { background: #705848; color: white; }
.type-poison { background: #a33ea1; color: white; }
.type-rock { background: #b6a136; color: white; }
.type-fighting { background: #c22e28; color: white; }
.type-ground { background: #e2bf65; color: #333; }
.type-flying { background: #a98ff3; color: white; }
.type-normal { background: #a8a878; color: white; }
.type-bug { background: #a8b820; color: white; }
.type-steel { background: #b7b7ce; color: #333; }

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
  .trainer-grid { grid-template-columns: repeat(2, 1fr); }
  .starter-grid { grid-template-columns: repeat(3, 1fr); }
  .battle-actions { grid-template-columns: 1fr 1fr; }
}

.loading-spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;

  margin-right: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }

/* battle shake animation */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.shake { animation: shake 0.3s ease-in-out; }
/* ===== POKEDEX ===== */
.pokedex-container {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  width: 100%;
  max-width: 700px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow);
  position: relative;
}

.pokedex-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--panel-border);
  flex-shrink: 0;
}

.pokedex-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--yellow);
  text-align: center;
  margin-bottom: 10px;
}

.pokedex-stats {
  display: flex;
  justify-content: center;

.pdex-stat {
  display: flex;
  align-items: center;
  gap: 6px;

}

.pdex-icon { font-size: 16px; }

.pokedex-search-wrap { display: flex; flex-direction: column; gap: 8px; }

.pokedex-search {
  width: 100%;

  border: 1px solid var(--panel-border);
  border-radius: 10px;

  font-size: 14px;

}

.pokedex-search:focus { border-color: var(--yellow); }
.pokedex-search::placeholder { color: var(--text-muted); }

.pdex-filter-btns { display: flex; gap: 8px; }

.pdex-filter-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--panel-border);

.pokedex-grid {

.pdex-item {

.pdex-item:hover { border-color: var(--yellow); background: rgba(245,197,24,0.08); }

.pdex-item.unseen .pdex-sprite { filter: brightness(0); opacity: 0.3; }

.pdex-sprite {
  width: 56px; height: 56px;

.pdex-num { font-size: 9px; color: var(--text-muted); margin-bottom: 2px; }
.pdex-name { font-size: 10px; font-weight: 700; text-transform: capitalize; }
.pdex-item.unseen .pdex-name { color: var(--text-muted); filter: blur(3px); user-select: none; }

.pdex-status-icon {

.pdex-detail-container {

.pdex-detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.pdex-detail-stat {

.pdex-detail-stat-label { font-size: 11px; color: var(--text-muted); }

.pdex-detail-bar-wrap { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 4px; overflow: hidden; }

.pdex-caught-badge {

  border: 1px solid rgba(255,255,255,0.2);

/* ===== POKEBALL THROW ANIMATION ===== */
.pokeball-throw-overlay {
  position: fixed; inset: 0; z-index: 9990;
  pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}

.pokeball-throw-wrap {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  gap: 16px;
}

.pokeball-throw-svg {
  width: 72px; height: 72px;
  animation: pokeballThrow 0.5s ease-out forwards;
  filter: drop-shadow(0 0 12px rgba(229,57,53,0.6));
}

@keyframes pokeballThrow {
  0%   { transform: scale(0.4) translateY(80px) rotate(-180deg); opacity: 0.5; }
  60%  { transform: scale(1.1) translateY(-8px) rotate(15deg); opacity: 1; }
  100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
}

.pokeball-shake {
  animation: pokeballShake 0.4s ease-in-out;
}
@keyframes pokeballShake {
  0%,100% { transform: rotate(0deg); }
  25%  { transform: rotate(-18deg); }
  75%  { transform: rotate(18deg); }
}

.pokeball-countdown {
  font-family: 'Press Start 2P', monospace;
  font-size: 28px;
  color: var(--yellow);
  text-shadow: 0 0 20px rgba(245,197,24,0.8);
  min-height: 40px;
  animation: countPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes countPop {
  from { transform: scale(0.3); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

.pokeball-result {
  font-size: 18px; font-weight: 900;
  text-align: center;
  padding: 10px 20px;
  border-radius: 12px;
  animation: resultFade 0.4s ease-out;
}
@keyframes resultFade {

  to   { opacity: 1; transform: translateY(0); }
}
.pokeball-result.caught { background: rgba(76,175,80,0.2); color: #4caf50; border: 1px solid #4caf50; }
.pokeball-result.escaped { background: rgba(244,67,54,0.2); color: #f44336; border: 1px solid #f44336; }

.found-pokeball-title {

auth.onAuthStateChanged(user => {

// ===== FIREBASE SAVE/LOAD =====
function saveGame() {
  if (!G.uid) return;
  const data = {
    trainer: G.trainerChoice,
    team: G.team,
    pc: G.pc,
    pokeballs: G.pokeballs,
    gymProgress: G.gymProgress,
    badges: G.badges,
    seen: G.seen || {},
    caught: G.caught || {}
  };
  db.ref('players/' + G.uid).set(data);
}

function loadGame() {
  db.ref('players/' + G.uid).once('value').then(snap => {
    const data = snap.val();
    if (data && data.trainer && data.team && data.team.length > 0) {
      G.trainerChoice = data.trainer;
      G.team = data.team || [];
      G.pc = data.pc || [];
      G.pokeballs = data.pokeballs != null ? data.pokeballs : 5;
      G.gymProgress = data.gymProgress || 0;
      G.badges = data.badges || 0;
      G.seen = data.seen || {};
      G.caught = data.caught || {};
      // retroactively mark team+pc as caught/seen
      [...G.team, ...G.pc].forEach(p => {
        G.seen[p.id] = true;
        G.caught[p.id] = true;
      });
      healAllPokemon();
      saveGame();
      enterGameScreen();
    } else {
      buildSetupScreen();
      showScreen('setup');
    }
  });
}

async function startGame() {
  document.getElementById('btnStartGame').disabled = true;
  document.getElementById('btnStartGame').innerHTML = '<span class="loading-spinner"></span>טוען...';

  G.trainerChoice = TRAINERS.find(t => t.id === selectedTrainer);
  G.pokeballs = 5;
  G.gymProgress = 0;
  G.badges = 0;

  const starterData = await fetchPokemon(selectedStarter);
  const starter = makePokemon(starterData, 5);
  G.team = [starter];
  G.pc = [];
  G.seen = { [starter.id]: true };
  G.caught = { [starter.id]: true };

  saveGame();
  enterGameScreen();
}

// ===== ZONE GRID =====
function buildZoneGrid() {
  const grid = document.getElementById('zoneGrid');
  // RTL: col order reversed visually, but zones defined by data
  // We lay them out row by row, right to left
  const ordered = [
    ZONES[0], ZONES[1], ZONES[2],  // row 0: fire(col2), tower(col1), sea(col0)
    ZONES[3], ZONES[4], ZONES[5],  // row 1: forest, desert, sea
    ZONES[6], ZONES[7], ZONES[8]   // row 2: cave, electric, sea
  ];
  grid.innerHTML = ordered.map((z, i) => `
    <div class="zone" onclick="clickZone(${i})" title="${z.name}">
    </div>`).join('');
}

// ===== POKEAPI =====
async function fetchPokemon(idOrName) {
  const key = String(idOrName).toLowerCase();
  if (pokeCache[key]) return pokeCache[key];
  const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${key}`);
  const data = await res.json();
  pokeCache[key] = data;
  return data;
}

async function fetchEvolutionChain(pokemonId) {
  const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${pokemonId}`);
  const species = await speciesRes.json();
  const chainRes = await fetch(species.evolution_chain.url);
  const chain = await chainRes.json();
  return chain;
}

function makePokemon(apiData, level) {
  const baseStats = {};
  apiData.stats.forEach(s => { baseStats[s.stat.name] = s.base_stat; });
  const mult = 1 + (level - 1) * 0.01;
  const types = apiData.types.map(t => t.type.name);
  const maxHP = Math.floor((baseStats['hp'] || 45) * mult);
  return {
    id: apiData.id,
    name: apiData.name,
    types,
    level,
    xp: xpForLevel(level),
    maxHP,
    currentHP: maxHP,
    attack: Math.floor((baseStats['attack'] || 50) * mult),
    defense: Math.floor((baseStats['defense'] || 50) * mult),
    spAttack: Math.floor((baseStats['special-attack'] || 50) * mult),
    spDefense: Math.floor((baseStats['special-defense'] || 50) * mult),
    sprite: apiData.sprites.front_default,
    backSprite: apiData.sprites.back_default || apiData.sprites.front_default,
    uid: Date.now() + Math.random()
  };
}

// ===== ZONE CLICK =====
const ORDERED_ZONES = [
  ZONES[0], ZONES[1], ZONES[2],
  ZONES[3], ZONES[4], ZONES[5],
  ZONES[6], ZONES[7], ZONES[8]
];

async function clickZone(idx) {
  if (battleState) return;
  const zone = ORDERED_ZONES[idx];

  // 1% chance for Pokeball drop
  if (Math.random() < 0.01) {
    G.pokeballs++;
    updateTopBar();
    saveGame();
    showFoundPokeballPopup();
    return;
  }

  const poke = spawnPokemon(zone.types);
  if (!poke) { showToast('אין פוקימונים באזור הזה כרגע...'); return; }

  try {
    const apiData = await fetchPokemon(poke.id);
    const level = randomEncounterLevel();
    const enemy = makePokemon(apiData, level);
    startWildBattle(enemy);
  } catch(e) {
    showToast('שגיאה בטעינת פוקימון, נסה שוב');
  }
}

function spawnPokemon(zoneTypes) {
  let pool = [];
  zoneTypes.forEach(t => {
    const list = BASE_POKEMON_BY_TYPE[t] || [];
    list.forEach(p => { if (!pool.find(x => x.id === p.id)) pool.push(p); });
  });
  if (!pool.length) return null;

  // Weighted random: 65/25/8/2
  const rand = Math.random() * 100;
  let targetRarity;
  if (rand < 2) {
    // legendary — pick from zone legendaries
    const legends = [];
    zoneTypes.forEach(t => { (LEGENDARIES_BY_TYPE[t]||[]).forEach(l => { if (!legends.find(x=>x.id===l.id)) legends.push(l); }); });
    if (legends.length) return legends[Math.floor(Math.random() * legends.length)];
    targetRarity = 'very_rare';
  } else if (rand < 10) {
    targetRarity = 'very_rare';
  } else if (rand < 35) {
    targetRarity = 'rare';
  } else {
    targetRarity = 'common';
  }

  const filtered = pool.filter(p => p.rarity === targetRarity);
  const chosen = filtered.length ? filtered : pool; // fallback
  return chosen[Math.floor(Math.random() * chosen.length)];
}

function randomEncounterLevel() {
  const minLvl = G.gymProgress === 0 ? 1 : GYM_LEVELS[G.gymProgress - 1];
  const maxLvl = GYM_LEVELS[Math.min(G.gymProgress, 7)];
  return Math.floor(Math.random() * (maxLvl - minLvl + 1)) + minLvl;
}

// ===== BATTLE SYSTEM =====
function getActivePokemon() {
  // During battle, respect the explicitly switched pokemon
  if (battleState && battleState.player && battleState.player.currentHP > 0) {
    return battleState.player;
  }
  return G.team.find(p => p.currentHP > 0) || null;
}

function startWildBattle(enemy) {
  const active = getActivePokemon();
  if (!active) { showToast('כל הפוקימונים הובסו! לך לג\'ים לאחר שתחזק את הקבוצה'); return; }

  battleState = { enemy, player: active, isGym: false, catchAttempts: 0, gymIndex: -1, gymPokeIndex: 0, enemyTeam: null };
  catchAttempts = 0;
  // Mark as seen

const TYPE_CHART = {
  fire:     { grass:2, ice:2, bug:2, steel:2, water:0.5, fire:0.5, rock:0.5, dragon:0.5 },
  water:    { fire:2, ground:2, rock:2, water:0.5, grass:0.5, dragon:0.5 },
  grass:    { water:2, ground:2, rock:2, fire:0.5, grass:0.5, poison:0.5, flying:0.5, bug:0.5, dragon:0.5, steel:0.5 },
  electric: { water:2, flying:2, grass:0.5, electric:0.5, dragon:0.5, ground:0 },
  ice:      { grass:2, ground:2, flying:2, dragon:2, fire:0.5, water:0.5, ice:0.5, steel:0.5 },
  fighting: { normal:2, ice:2, rock:2, dark:2, steel:2, poison:0.5, bug:0.5, psychic:0.5, flying:0.5, fairy:0.5, ghost:0 },
  poison:   { grass:2, fairy:2, poison:0.5, ground:0.5, rock:0.5, ghost:0.5, steel:0 },
  ground:   { fire:2, electric:2, poison:2, rock:2, steel:2, grass:0.5, bug:0.5, flying:0 },
  flying:   { grass:2, fighting:2, bug:2, electric:0.5, rock:0.5, steel:0.5 },
  psychic:  { fighting:2, poison:2, psychic:0.5, steel:0.5, dark:0 },
  bug:      { grass:2, psychic:2, dark:2, fire:0.5, fighting:0.5, flying:0.5, ghost:0.5, steel:0.5, fairy:0.5 },
  rock:     { fire:2, ice:2, flying:2, bug:2, fighting:0.5, ground:0.5, steel:0.5 },
  ghost:    { psychic:2, ghost:2, normal:0, dark:0.5 },
  dragon:   { dragon:2, steel:0.5, fairy:0 },
  dark:     { psychic:2, ghost:2, fighting:0.5, dark:0.5, fairy:0.5 },
  steel:    { ice:2, rock:2, fairy:2, fire:0.5, water:0.5, electric:0.5, steel:0.5 },
  fairy:    { fighting:2, dragon:2, dark:2, fire:0.5, poison:0.5, steel:0.5 },
  normal:   {}
};

function getTypeMultiplier(attackerTypes, defenderTypes) {
  let mult = 1;
  (attackerTypes || []).forEach(atk => {
    (defenderTypes || []).forEach(def => {
      const val = (TYPE_CHART[atk] || {})[def];
      if (val !== undefined) mult *= val;
    });
  });
  return mult;
}

function typeEffectivenessText(mult) {
  if (mult >= 4) return ' 💥 יעיל ביותר!';
  if (mult >= 2) return ' ⚡ יעיל מאוד!';
  if (mult === 0) return ' 🚫 לא השפיע!';
  if (mult < 1) return ' 😐 לא יעיל במיוחד';
  return '';
}

function calcDamage(attacker, defender, type) {
  const atk = type === 'physical' ? attacker.attack : attacker.spAttack;
  const def = type === 'physical' ? defender.defense : defender.spDefense;
  const power = type === 'physical' ? 40 : 50;
  const level = attacker.level || 1;
  // Gen 1 damage formula
  const base = Math.floor((((2 * level / 5 + 2) * power * atk / def) / 50) + 2);
  const factor = 0.85 + Math.random() * 0.15; // random 85%–100%
  const typeMult = getTypeMultiplier(attacker.types || [], defender.types || []);
  return { dmg: Math.max(1, Math.floor(base * factor * typeMult)), mult: typeMult };
}

async function playerAttack(type) {
  if (!battleState) return;
  if (battleState.isGym) {
    await playerAttackGym(type);
  } else {
    await playerAttackWild(type);
  }
}

// WILD BATTLE — fast auto-combat until one side faints or HP threshold
async function playerAttackWild(type) {
  setBattleButtonsEnabled(false);
  let player = getActivePokemon();
  if (!player) return;
  const enemy = battleState.enemy;

  // Run rounds until enemy at 0 or player at 0
  while (enemy.currentHP > 0 && player && player.currentHP > 0) {
    // Player hit
    const result = calcDamage(player, enemy, type);
    enemy.currentHP = Math.max(0, enemy.currentHP - result.dmg);
    updateBattleHP('enemy', enemy);
    shakeSprite('battleEnemySprite');

    if (enemy.currentHP <= 0) break;

    await sleep(180);

    // Enemy hit
    const physResult = calcDamage(enemy, player, 'physical');
    const specResult = calcDamage(enemy, player, 'special');
    const eResult = physResult.dmg >= specResult.dmg ? physResult : specResult;
    player.currentHP = Math.max(0, player.currentHP - eResult.dmg);
    updateBattleHP('player', player);
    shakeSprite('battlePlayerSprite');

    if (player.currentHP <= 0) break;

    await sleep(180);
    // Next round: enemy picks best type
    const pR2 = calcDamage(player, enemy, 'physical');
    const sR2 = calcDamage(player, enemy, 'special');
    type = pR2.dmg >= sR2.dmg ? 'physical' : 'special';
  }

  await sleep(250);

  if (enemy.currentHP <= 0) {
    setBattleLog(`${enemy.name} הובס! 🎉`);
    await sleep(400);
    showPostBattleActions();
  } else if (!player || player.currentHP <= 0) {
    setBattleLog(`${player.name} הובס! 😞`);
    await sleep(400);
    const next = G.team.find(p => p.currentHP > 0 && p !== player);
    if (next) {
      battleState.player = next;
      document.getElementById('battlePlayerSprite').src = next.backSprite || next.sprite;
      document.getElementById('battlePlayerName').textContent = next.name;
      document.getElementById('battlePlayerLevel').textContent = 'רמה ' + next.level;
      document.getElementById('battlePlayerTypes').innerHTML = (next.types||[]).map(t =>
        `<span class="type-badge ${TYPE_COLORS[t]||''}">${t}</span>`).join('');
      updateBattleHP('player', next);
      updateTeamPanel();
      setBattleButtonsEnabled(true);
    } else {
      setBattleLog('כל הפוקימונים הובסו! 😢 מתרפאים...');
      healAllPokemon(); saveGame();
      await sleep(1000);
      closeAllOverlays(); battleState = null; updateTeamPanel();
      showToast('💊 כל הפוקימונים התרפאו!');
    }
  }
  saveGame();
}

// GYM BATTLE — slow turn-by-turn (original behavior)
async function playerAttackGym(type) {
  setBattleButtonsEnabled(false);
  const player = getActivePokemon();
  if (!player) return;
  const enemy = battleState.enemy;

  const result = calcDamage(player, enemy, type);
  const dmg = result.dmg;
  enemy.currentHP = Math.max(0, enemy.currentHP - dmg);
  const atkName = type === 'physical' ? 'התקפה' : 'התקפה מיוחדת';
  setBattleLog(`${player.name} השתמש ב${atkName}! גרם ${dmg} נזק!${typeEffectivenessText(result.mult)}`);
  updateBattleHP('enemy', enemy);
  shakeSprite('battleEnemySprite');

  await sleep(900);

  if (enemy.currentHP <= 0) {
    setBattleLog(`${enemy.name} הובס! 🎉`);
    await sleep(700);
    handleGymEnemyFainted();
    return;
  }

  const physResult = calcDamage(enemy, player, 'physical');
  const specResult = calcDamage(enemy, player, 'special');
  const eResult = physResult.dmg >= specResult.dmg ? physResult : specResult;
  const eDmg = eResult.dmg;
  player.currentHP = Math.max(0, player.currentHP - eDmg);

  setBattleLog(`${enemy.name} תקף! גרם ${eDmg} נזק!${typeEffectivenessText(eResult.mult)}`);
  updateBattleHP('player', player);
  shakeSprite('battlePlayerSprite');

  await sleep(700);

  if (player.currentHP <= 0) {
    setBattleLog(`${player.name} הובס! 😞`);
    await sleep(700);
    const next = G.team.find(p => p.currentHP > 0 && p !== player);
    if (next) {
      setBattleLog(`${next.name} נכנס לקרב!`);
      battleState.player = next;
      await sleep(600);
      document.getElementById('battlePlayerSprite').src = next.backSprite || next.sprite;
      document.getElementById('battlePlayerName').textContent = next.name;
      document.getElementById('battlePlayerLevel').textContent = 'רמה ' + next.level;
      document.getElementById('battlePlayerTypes').innerHTML = (next.types||[]).map(t =>
        `<span class="type-badge ${TYPE_COLORS[t]||''}">${t}</span>`).join('');
      updateBattleHP('player', next);
      updateTeamPanel();
      setBattleButtonsEnabled(true);
    } else {
      setBattleLog('כל הפוקימונים הובסו! 😢 מתרפאים...');
      healAllPokemon(); saveGame();
      await sleep(1500);
      closeAllOverlays(); battleState = null; updateTeamPanel();
      showToast('💊 כל הפוקימונים התרפאו! המשך לשחק');
    }
  } else {
    updateTeamPanel();
    setBattleButtonsEnabled(true);
  }
  saveGame();
}

async function tryToCatch() {
  if (!battleState || G.pokeballs <= 0) return;
  G.pokeballs--;
  updateTopBar();
  catchAttempts++;
  document.getElementById('btnCatch').disabled = true;

  const enemyName = battleState.enemy.name;
  const success = Math.random() < 0.5;

  // Show pokeball throw overlay
  const throwDiv = document.createElement('div');
  throwDiv.className = 'pokeball-throw-overlay';
  throwDiv.innerHTML = `
    <div class="pokeball-throw-wrap">
      <div id="pbThrowSvg" class="pokeball-throw-svg">${POKEBALL_SVG}</div>
      <div class="pokeball-countdown" id="pbCountdown"></div>
      <div id="pbResult"></div>
    </div>`;
  document.body.appendChild(throwDiv);

  // Countdown 3,2,1 with shakes
  for (let i = 3; i >= 1; i--) {
    const cd = document.getElementById('pbCountdown');
    if (cd) { cd.textContent = i; cd.style.animation = 'none'; void cd.offsetWidth; cd.style.animation = 'countPop 0.3s cubic-bezier(0.34,1.56,0.64,1)'; }
    const svgEl = document.getElementById('pbThrowSvg');
    if (svgEl) { svgEl.classList.add('pokeball-shake'); setTimeout(() => svgEl.classList.remove('pokeball-shake'), 400); }
    await sleep(700);
  }

  const cd = document.getElementById('pbCountdown');
  if (cd) cd.textContent = '';

  const resEl = document.getElementById('pbResult');
  if (success) {
    if (resEl) { resEl.className = 'pokeball-result caught'; resEl.textContent = `✅ ${enemyName} נתפס!`; }
    await sleep(1200);
    throwDiv.remove();

    G.caught[battleState.enemy.id] = true;
    G.seen[battleState.enemy.id] = true;
    addToTeamOrPC(battleState.enemy);
    healAllPokemon(); saveGame();
    closeAllOverlays(); updateTeamPanel();
    showToast(`${enemyName} נוסף לקבוצה שלך!`);
    battleState = null;
  } else {
    if (catchAttempts >= 2) {
      if (resEl) { resEl.className = 'pokeball-result escaped'; resEl.textContent = `❌ ${enemyName} ברח!`; }
      await sleep(1200);
      throwDiv.remove();
      healAllPokemon(); saveGame();
      closeAllOverlays(); battleState = null;
    } else {
      if (resEl) { resEl.className = 'pokeball-result escaped'; resEl.textContent = `❌ נמלט! ניסיון אחרון`; }
      await sleep(1200);
      throwDiv.remove();
      setBattleLog(`❌ ${enemyName} נמלט! ניסיון אחרון (${G.pokeballs} כדורים)`);
      const btn = document.getElementById('btnCatch');
      if (btn) {
        btn.disabled = G.pokeballs <= 0;
        btn.innerHTML = `<svg viewBox="0 0 20 20" width="18" height="18" style="vertical-align:middle;margin-left:6px" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="9" fill="white" stroke="#555" stroke-width="1.5"/><path d="M1 10 Q1 1 10 1 Q19 1 19 10" fill="#e53935"/><rect x="1" y="9.2" width="18" height="1.6" fill="#333"/><circle cx="10" cy="10" r="3" fill="white" stroke="#333" stroke-width="1.5"/><circle cx="10" cy="10" r="1.5" fill="#ccc"/></svg> נסה שוב!`;
      }
    }
  }
}

function releaseForXP() {
  if (!battleState) return;
  const enemy = battleState.enemy;
  const xpGain = enemy.attack + enemy.spAttack;
  const active = getActivePokemon();

  G.team.forEach(p => {
    if (p.currentHP <= 0) return;
    const gain = p === active ? Math.floor(xpGain * 0.5) : Math.floor(xpGain * 0.5 / Math.max(1, G.team.filter(x => x.currentHP > 0).length - 1));
    giveXP(p, gain);
  });

  setBattleLog(`${enemy.name} שוחרר. קיבלת ${xpGain} נקודות ניסיון! 🌟`);
  healAllPokemon();
  saveGame();

  setTimeout(() => {
    closeAllOverlays();
    updateTeamPanel();
    battleState = null;
    checkEvolutions();
  }, 1200);
}

function healAllPokemon() {
  G.team.forEach(p => { p.currentHP = p.maxHP; });
  G.pc.forEach(p => { p.currentHP = p.maxHP; });
}

function switchPokemonInBattle() {
  const current = getActivePokemon();
  const opts = G.team.filter(p => p.currentHP > 0 && p !== current);
  if (!opts.length) { showToast('אין פוקימונים אחרים זמינים'); return; }

  const list = document.getElementById('switchPokemonList');
  list.innerHTML = opts.map((p, i) => {
    const hpPct = Math.max(0, p.currentHP / p.maxHP * 100);
    const hpColor = hpPct > 50 ? '#4caf50' : hpPct > 25 ? '#ff9800' : '#f44336';
    const types = (p.types||[]).map(t => `<span class="type-badge ${TYPE_COLORS[t]||''}" style="font-size:10px;padding:1px 6px">${t}</span>`).join('');
    return `<button class="switch-pokemon-btn" onclick="doSwitchInBattle(${G.team.indexOf(p)}); closeOverlay('switchOverlay')">
      <img src="${p.sprite}" alt="${p.name}">
      <div class="switch-poke-info">

        <div class="switch-poke-level">רמה ${p.level}</div>
        <div class="switch-poke-hp">${p.currentHP}/${p.maxHP} HP</div>
        <div class="switch-hp-bar"><div class="switch-hp-fill" style="width:${hpPct}%;background:${hpColor}"></div></div>
      </div>
    </button>`;
  }).join('');

  showOverlay('switchOverlay');
}

function doSwitchInBattle(teamIdx) {
  const chosen = G.team[teamIdx];
  if (!chosen || chosen.currentHP <= 0) return;

  // Update battleState so attack logic uses new pokemon
  if (battleState) battleState.player = chosen;

  document.getElementById('battlePlayerSprite').src = chosen.backSprite || chosen.sprite;
  document.getElementById('battlePlayerName').textContent = chosen.name;
  document.getElementById('battlePlayerLevel').textContent = 'רמה ' + chosen.level;
  document.getElementById('battlePlayerTypes').innerHTML = (chosen.types||[]).map(t =>
    `<span class="type-badge ${TYPE_COLORS[t]||''}">${t}</span>`).join('');

  setBattleLog(`${chosen.name} נכנס לקרב!`);
}

async function startGymBattle() {
  closeOverlay('gymOverlay');
  const gymIdx = G.gymProgress;
  const leader = GYM_LEADERS[gymIdx];
  const gymLevel = GYM_LEVELS[gymIdx];

  // Build gym team
  const gymTeam = [];
  for (const pname of leader.pokemon) {
    try {
      const apiData = await fetchPokemon(pname);
      gymTeam.push(makePokemon(apiData, gymLevel));
    } catch(e) {}
  }

  if (!gymTeam.length) { showToast('שגיאה בטעינת ג\'ים'); return; }

  const active = getActivePokemon();
  if (!active) { showToast('כל הפוקימונים הובסו!'); return; }

  battleState = {
    enemy: gymTeam[0],
    player: active,
    isGym: true,
    gymIndex: gymIdx,
    gymPokeIndex: 0,
    enemyTeam: gymTeam,
    catchAttempts: 0
  };

  setupBattleUI(active, gymTeam[0]);
  showOverlay('battleOverlay');
  document.getElementById('battleActions').classList.remove('hidden');
  document.getElementById('postBattleActions').classList.add('hidden');
  setBattleLog(`קרב ג'ים נגד ${leader.name}! ${gymTeam[0].name} הופיע!`);
}

async function handleGymEnemyFainted() {
  const bs = battleState;
  bs.gymPokeIndex++;

  if (bs.gymPokeIndex >= bs.enemyTeam.length) {
    // Won the gym!
    const wonGymIdx = G.gymProgress;
    G.gymProgress++;
    G.badges++;
    updateTopBar();
    healAllPokemon();
    const xpGain = 200 * (wonGymIdx + 1);
    G.team.forEach(p => { if (p.currentHP > 0) giveXP(p, xpGain); });
    saveGame();
    setBattleLog(`🏆 ניצחת את הג'ים! קיבלת את התג!`);
    await sleep(800);
    closeAllOverlays();
    battleState = null;
    updateTeamPanel();
    showGymBadgeScreen(wonGymIdx, () => { checkEvolutions(); });
  } else {
    const nextEnemy = bs.enemyTeam[bs.gymPokeIndex];
    bs.enemy = nextEnemy;
    setBattleLog(`${GYM_LEADERS[bs.gymIndex].name} שלח את ${nextEnemy.name}!`);
    await sleep(600);
    document.getElementById('battleEnemySprite').src = nextEnemy.sprite;
    document.getElementById('battleEnemyName').textContent = nextEnemy.name;
    document.getElementById('battleEnemyLevel').textContent = 'רמה ' + nextEnemy.level;
    updateBattleHP('enemy', nextEnemy);
    setBattleButtonsEnabled(true);
  }
}

// ===== XP & LEVELING =====
function giveXP(poke, amount) {
  poke.xp = (poke.xp || 0) + amount;
  const maxGymLevel = GYM_LEVELS[Math.min(G.gymProgress, 7)];

  while (poke.level < maxGymLevel) {
    const needed = xpForLevel(poke.level + 1);
    if (poke.xp >= needed) {
      poke.level++;
      recalcStats(poke);
      showLevelUpToast(poke);
    } else break;
  }
}

function showLevelUpToast(poke) {
  const toast = document.getElementById('levelupToast');
  document.getElementById('levelupPokeName').textContent = poke.name;
  document.getElementById('levelupNumber').textContent = poke.level;
  toast.classList.remove('hide');
  toast.classList.add('show');
  clearTimeout(toast._lvlTimer);
  toast._lvlTimer = setTimeout(() => {
    toast.classList.add('hide');
    setTimeout(() => toast.classList.remove('show', 'hide'), 350);
  }, 2000);
}

function recalcStats(poke) {
  const mult = 1 + (poke.level - 1) * 0.01;
  const cached = pokeCache[String(poke.id)];
  if (!cached) return;
  const baseStats = {};
  cached.stats.forEach(s => { baseStats[s.stat.name] = s.base_stat; });
  poke.maxHP = Math.floor((baseStats['hp'] || 45) * mult);
  poke.currentHP = Math.min(poke.currentHP, poke.maxHP);
  poke.attack = Math.floor((baseStats['attack'] || 50) * mult);
  poke.defense = Math.floor((baseStats['defense'] || 50) * mult);
  poke.spAttack = Math.floor((baseStats['special-attack'] || 50) * mult);
  poke.spDefense = Math.floor((baseStats['special-defense'] || 50) * mult);
}

// ===== EVOLUTION =====
async function checkEvolutions() {
  for (const poke of G.team) {
    await tryEvolve(poke);
  }
}

async function tryEvolve(poke) {
  try {
    const chainData = await fetchEvolutionChain(poke.id);
    const evo = findNextEvolution(chainData.chain, poke.id, poke.level);
    if (evo) {
      await doEvolve(poke, evo);
    }
  } catch(e) {}
}

function findNextEvolution(chain, currentId, level) {
  if (chain.species.url.includes('/' + currentId + '/')) {
    for (const evo of chain.evolves_to) {
      const detail = evo.evolution_details[0];
      if (detail && detail.trigger && detail.trigger.name === 'level-up') {
        const minLevel = detail.min_level || 1;
        if (level >= minLevel) {
          const evoId = parseInt(evo.species.url.split('/').slice(-2)[0]);
          return { id: evoId, name: evo.species.name, level: minLevel };
        }
      }
    }
  }
  for (const evo of chain.evolves_to) {
    const result = findNextEvolution(evo, currentId, level);
    if (result) return result;
  }
  return null;
}

async function doEvolve(poke, evoData) {
  const evoApiData = await fetchPokemon(evoData.id);
  const oldName = poke.name;
  const oldSprite = poke.sprite;
  const newSprite = evoApiData.sprites.front_default;

  // Generate particles HTML
  const particles = Array.from({length: 16}, (_, i) => {
    const angle = (i / 16) * 360;
    const dist = 60 + Math.random() * 60;
    const tx = Math.cos(angle * Math.PI/180) * dist;
    const ty = Math.sin(angle * Math.PI/180) * dist - 40;
    const colors = ['#ffd700','#fff','#aaf','#f0f','#0ff'];
    const color = colors[i % colors.length];
    return `<div class="evo-particle" style="
      left:50%; top:50%;
      background:${color};
      --tx:${tx}px; --ty:${ty}px;
      --dur:${1.2 + Math.random()*0.8}s;
      --delay:${Math.random()*0.5}s;
    "></div>`;
  }).join('');

  const content = document.getElementById('evolutionContent');
  content.innerHTML = `
    <div class="evo-title">✨ ${oldName} מתפתח! ✨</div>
    <div class="evolution-imgs">
      <div class="evo-particles">${particles}</div>
      <div class="evo-sprite-wrap">
        <div class="evo-sprite-old"><img src="${oldSprite}" alt="${oldName}"></div>
        <span>${oldName}</span>
      </div>
      <div class="evo-arrow-wrap">
        <div class="evo-arrow">→</div>
      </div>
      <div class="evo-sprite-wrap">
        <div class="evo-sprite-new"><img src="${newSprite}" alt="${evoData.name}"></div>
        <span>${evoData.name}</span>
      </div>
    </div>
    <div class="evo-name-reveal">🎉 ${evoData.name}!</div>
    <div class="evo-subtitle">${oldName} התפתח!</div>`;

  showOverlay('evolutionOverlay');
  await sleep(4000);
  closeOverlay('evolutionOverlay');

  poke.id = evoData.id;
  poke.name = evoData.name;
  poke.sprite = newSprite;
  poke.backSprite = evoApiData.sprites.back_default || newSprite;
  poke.types = evoApiData.types.map(t => t.type.name);
  recalcStats(poke);
  saveGame();
  updateTeamPanel();
}

// ===== TEAM & PC =====
function addToTeamOrPC(poke) {
  if (G.team.length < 6) G.team.push(poke);
  else G.pc.push(poke);
}

function updateTeamPanel() {
  const slots = document.getElementById('teamSlots');
  slots.innerHTML = '';
  G.team.forEach((p, i) => {
    const hpPct = p.maxHP > 0 ? Math.max(0, p.currentHP / p.maxHP * 100) : 0;
    const hpColor = hpPct > 50 ? '#4caf50' : hpPct > 25 ? '#ff9800' : '#f44336';
    const slot = document.createElement('div');
    slot.className = 'team-slot';
    slot.onclick = () => openPokeCard(i, 'team');
    slot.innerHTML = `
      <img src="${p.sprite}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/44/333/fff?text=?'">
      <div class="slot-level">L${p.level}</div>
      <div class="slot-hp-bar"><div class="slot-hp-fill" style="width:${hpPct}%; background:${hpColor}"></div></div>`;
    slots.appendChild(slot);
  });
}

function openPokeCard(index, source) {
  const poke = source === 'team' ? G.team[index] : G.pc[index];
  if (!poke) return;

  const xpCurrent = poke.xp || 0;
  const xpNext = xpForLevel(poke.level + 1);
  const xpPct = Math.min(100, (xpCurrent / xpNext) * 100);

  const typesBadges = poke.types.map(t =>
    `<span class="type-badge ${TYPE_COLORS[t] || ''}">${t}</span>`).join('');

  const stats = [
    { label: 'HP', val: poke.maxHP, max: 250 },
    { label: 'התקפה', val: poke.attack, max: 200 },
    { label: 'הגנה', val: poke.defense, max: 200 },
    { label: 'התק׳ מיוחדת', val: poke.spAttack, max: 200 },
    { label: 'הגנה מיוחדת', val: poke.spDefense, max: 200 }
  ];

  const statsHTML = stats.map(s => `
    <div class="stat-row">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.val}</div>
      <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${Math.min(100, s.val/s.max*100)}%"></div></div>
    </div>`).join('');

  const actions = source === 'team'
    ? `<button class="btn-battle btn-special" onclick="moveToFront(${index}, 'team'); closeOverlay('pokeCardOverlay')" ${index === 0 ? 'disabled' : ''}>⬆️ העבר לראש</button>
       <button class="btn-battle btn-run" onclick="moveToPc(${index}); closeOverlay('pokeCardOverlay')">📦 העבר ל-PC</button>`
    : `<button class="btn-battle btn-special" onclick="moveToTeam(${index}); closeOverlay('pokeCardOverlay')" ${G.team.length >= 6 ? 'disabled title="הקבוצה מלאה"' : ''}>➕ הוסף לקבוצה</button>
       <button class="btn-battle btn-attack" onclick="moveToFrontFromPC(${index}); closeOverlay('pokeCardOverlay')" ${G.team.length >= 6 ? 'disabled title="הקבוצה מלאה"' : ''}>⬆️ הוסף לראש הקבוצה</button>`;

  document.getElementById('pokeCardContent').innerHTML = `
    <button class="card-close" onclick="closeOverlay('pokeCardOverlay')">✕</button>
    <div class="card-sprite"><img src="${poke.sprite}" alt="${poke.name}"></div>
    <div class="card-name">${poke.name}</div>
    <div class="card-types">${typesBadges}</div>
    <div style="text-align:center; font-size:13px; color:var(--text-muted); margin-bottom:12px">רמה ${poke.level}</div>
    <div class="xp-row">
      <div class="xp-label">XP: ${xpCurrent} / ${xpNext}</div>
      <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
    </div>
    <div class="card-stats">${statsHTML}</div>
    <div class="card-actions">${actions}
      <button class="btn-battle btn-run" onclick="closeOverlay('pokeCardOverlay')">סגור</button>
    </div>`;

  showOverlay('pokeCardOverlay');
}

function moveToFront(teamIndex, source) {
  if (teamIndex === 0) return;
  const poke = G.team.splice(teamIndex, 1)[0];
  G.team.unshift(poke);
  updateTeamPanel();
  saveGame();
  showToast(`${poke.name} הועבר לראש הקבוצה!`);
}

function moveToFrontFromPC(pcIndex) {
  if (G.team.length >= 6) { showToast('הקבוצה מלאה! העבר פוקימון ל-PC קודם'); return; }
  const poke = G.pc.splice(pcIndex, 1)[0];
  G.team.unshift(poke);
  updateTeamPanel();
  saveGame();
  showToast(`${poke.name} הוסף לראש הקבוצה!`);
}

function moveToPc(teamIndex) {
  if (G.team.length <= 1) { showToast('חייב להיות לך לפחות פוקימון אחד בקבוצה!'); return; }
  const poke = G.team.splice(teamIndex, 1)[0];
  G.pc.push(poke);
  updateTeamPanel();
  saveGame();
  showToast(`${poke.name} הועבר ל-PC`);
}

function moveToTeam(pcIndex) {
  if (G.team.length >= 6) { showToast('הקבוצה מלאה! העבר פוקימון ל-PC קודם'); return; }
  const poke = G.pc.splice(pcIndex, 1)[0];
  G.team.push(poke);
  updateTeamPanel();
  saveGame();
  showToast(`${poke.name} הוסף לקבוצה!`);
}

function openPC() {
  const grid = document.getElementById('pcGrid');
  const empty = document.getElementById('pcEmpty');
  grid.innerHTML = '';

  if (!G.pc.length) {
    empty.style.display = 'block';
    grid.style.display = 'none';
  } else {
    empty.style.display = 'none';
    grid.style.display = 'grid';
    G.pc.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'pc-pokemon-item';
      el.onclick = () => openPokeCard(i, 'pc');
      el.innerHTML = `
        <img src="${p.sprite}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/56/333/fff?text=?'">
        <div class="pc-name">${p.name}</div>
        <div class="pc-level">רמה ${p.level}</div>`;
      grid.appendChild(el);
    });
  }
  showOverlay('pcOverlay');
}

function closePC() { closeOverlay('pcOverlay'); }

// ===== POKEDEX =====
let pokedexData = [];       // [{id, name}] all 1025
let pokedexFilter = 'all';
let pokedexSearchTerm = '';
let pokedexLoaded = false;

async function openPokedex() {
  showOverlay('pokedexOverlay');
  updatePokedexStats();

  if (!pokedexLoaded) {
    document.getElementById('pokedexLoading').style.display = 'block';
    document.getElementById('pokedexGrid').innerHTML = '';
    await loadPokedexList();
    document.getElementById('pokedexLoading').style.display = 'none';
    pokedexLoaded = true;
  }
  renderPokedexGrid();
}

async function loadPokedexList() {
  try {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025&offset=0');
    const data = await res.json();
    pokedexData = data.results.map((p, i) => ({ id: i + 1, name: p.name }));
  } catch(e) {
    showToast('שגיאה בטעינת הפוקדקס');
  }
}

function updatePokedexStats() {
  document.getElementById('pdexSeen').textContent = Object.keys(G.seen || {}).length;
  document.getElementById('pdexCaught').textContent = Object.keys(G.caught || {}).length;
}

function renderPokedexGrid() {
  const grid = document.getElementById('pokedexGrid');
  const search = pokedexSearchTerm.toLowerCase();

  let list = pokedexData;
  if (search) list = list.filter(p => p.name.includes(search) || String(p.id).includes(search));
  if (pokedexFilter === 'seen')   list = list.filter(p => G.seen[p.id]);
  if (pokedexFilter === 'caught') list = list.filter(p => G.caught[p.id]);

  grid.innerHTML = list.map(p => {
    const isCaught = G.caught[p.id];
    const isSeen   = G.seen[p.id];
    const cls = isCaught ? 'caught' : isSeen ? 'seen' : 'unseen';
    const pokeballSvg = `<svg viewBox="0 0 20 20" width="13" height="13" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle">
      <circle cx="10" cy="10" r="9" fill="white" stroke="#333" stroke-width="1.5"/>
      <path d="M1 10 Q1 1 10 1 Q19 1 19 10" fill="#e53935"/>
      <rect x="1" y="9.2" width="18" height="1.6" fill="#333"/>
      <circle cx="10" cy="10" r="3" fill="white" stroke="#333" stroke-width="1.5"/>
      <circle cx="10" cy="10" r="1.5" fill="#ccc"/>
    </svg>`;
    const icon = isCaught ? pokeballSvg : '';
    const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;
    return `<div class="pdex-item ${cls}" onclick="openPokedexDetail(${p.id})">
      ${icon ? `<div class="pdex-status-icon">${icon}</div>` : ''}
      <img class="pdex-sprite" src="${spriteUrl}" alt="${p.name}" loading="lazy">
      <div class="pdex-num">#${String(p.id).padStart(3,'0')}</div>
      <div class="pdex-name">${isSeen ? p.name : '???'}</div>
    </div>`;
  }).join('');
}

function filterPokedex(val) {
  pokedexSearchTerm = val;
  renderPokedexGrid();
}

function setPokedexFilter(filter, btn) {
  pokedexFilter = filter;
  document.querySelectorAll('.pdex-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPokedexGrid();
}

async function openPokedexDetail(id) {
  const isSeen   = !!G.seen[id];
  const isCaught = !!G.caught[id];
  const name = pokedexData.find(p => p.id === id)?.name || '???';

  const content = document.getElementById('pdexDetailContent');
  content.innerHTML = `
    <div class="pdex-detail-header">
      <button class="pdex-detail-close" onclick="closeOverlay('pokedexDetailOverlay')">✕</button>
      <div class="pdex-detail-num">#${String(id).padStart(3,'0')}</div>
      <div class="pdex-detail-sprite-wrap">
        <img class="pdex-detail-sprite ${isSeen ? '' : 'unseen-detail'}"
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png" alt="${name}">
      </div>
      <div class="pdex-detail-name ${isSeen ? '' : 'unseen-detail'}">${isSeen ? name : '???'}</div>
      ${isCaught ? `<div class="pdex-caught-badge"><svg viewBox="0 0 20 20" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="9" fill="white" stroke="#555" stroke-width="1.5"/><path d="M1 10 Q1 1 10 1 Q19 1 19 10" fill="#e53935"/><rect x="1" y="9.2" width="18" height="1.6" fill="#333"/><circle cx="10" cy="10" r="3" fill="white" stroke="#333" stroke-width="1.5"/><circle cx="10" cy="10" r="1.5" fill="#ccc"/></svg> נלכד!</div>` : isSeen ? '<div style="font-size:13px;color:var(--blue)">👁️ נראה</div>' : '<div style="font-size:13px;color:var(--text-muted)">לא נפגש עדיין</div>'}
    </div>
    <div class="pdex-detail-body" id="pdexDetailBody">
      ${isSeen ? '<div style="text-align:center;color:var(--text-muted);padding:10px"><span class="loading-spinner"></span></div>' : 
        '<div class="pdex-detail-desc">פגוש פוקימון זה כדי לחשוף מידע!</div>'}
    </div>`;

  showOverlay('pokedexDetailOverlay');

  if (!isSeen) return;

  try {
    const apiData = await fetchPokemon(id);
    const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`);
    const species = await speciesRes.json();

    // Get Hebrew/English flavor text
    const flavorEntry = species.flavor_text_entries.find(e => e.language.name === 'en');
    const flavor = flavorEntry ? flavorEntry.flavor_text.replace(/\f/g,' ').replace(/\n/g,' ') : '';

    const types = apiData.types.map(t =>
      `<span class="type-badge ${TYPE_COLORS[t.type.name]||''}">${t.type.name}</span>`).join(' ');

    const statNames = { hp:'HP', attack:'התקפה', defense:'הגנה', 'special-attack':'התק׳ מיוחדת', 'special-defense':'הגנה מיוחדת', speed:'מהירות' };
    const statsHTML = apiData.stats.map(s => {
      const label = statNames[s.stat.name] || s.stat.name;
      const pct = Math.min(100, s.base_stat / 255 * 100);
      const color = s.base_stat >= 100 ? '#4caf50' : s.base_stat >= 60 ? '#2a75bb' : '#ff9800';
      return `<div class="pdex-detail-stat">
        <div class="pdex-detail-stat-label">${label}</div>
        <div class="pdex-detail-stat-value">${s.base_stat}</div>
        <div class="pdex-detail-bar-wrap"><div class="pdex-detail-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');

    const height = (apiData.height / 10).toFixed(1);
    const weight = (apiData.weight / 10).toFixed(1);

    document.getElementById('pdexDetailBody').innerHTML = `
      <div style="text-align:center;margin-bottom:12px">${types}</div>
      <div class="pdex-detail-desc">${flavor}</div>
      <div style="display:flex;gap:16px;justify-content:center;margin-bottom:16px">
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-muted)">גובה</div>
          <div style="font-size:16px;font-weight:700">${height}m</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-muted)">משקל</div>
          <div style="font-size:16px;font-weight:700">${weight}kg</div>
        </div>
      </div>
      <div class="pdex-detail-stats">${statsHTML}</div>`;
  } catch(e) {
    document.getElementById('pdexDetailBody').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px">שגיאה בטעינת נתונים</div>';
  }
}
