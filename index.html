<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéMon ForEveR</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
:root {
  --red: #e3350d;
  --dark-red: #9b1a00;
  --yellow: #f5c518;
  --blue: #2a75bb;
  --dark: #1a1a2e;
  --darker: #0f0f1a;
  --panel: rgba(20,20,40,0.92);
  --panel-border: rgba(255,255,255,0.12);
  --text: #f0f0f0;
  --text-muted: #aaa;
  --green: #4caf50;
  --hp-high: #4caf50;
  --hp-mid: #ff9800;
  --hp-low: #f44336;
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--darker);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
}

/* ===== AUTH SCREEN ===== */
#authScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%);
  gap: 28px;
}

.auth-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(18px, 4vw, 36px);
  color: var(--yellow);
  text-shadow: 0 0 20px rgba(245,197,24,0.6), 4px 4px 0 var(--dark-red);
  text-align: center;
  line-height: 1.6;
  animation: titlePulse 2s ease-in-out infinite alternate;
}

@keyframes titlePulse {
  from { text-shadow: 0 0 20px rgba(245,197,24,0.4), 4px 4px 0 var(--dark-red); }
  to { text-shadow: 0 0 40px rgba(245,197,24,0.9), 4px 4px 0 var(--dark-red); }
}

.pokeball-logo {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: linear-gradient(180deg, var(--red) 50%, white 50%);
  border: 6px solid #222;
  position: relative;
  animation: rotateBall 3s linear infinite;
  box-shadow: 0 0 40px rgba(227,53,13,0.5);
}

.pokeball-logo::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 30px; height: 30px;
  background: white;
  border-radius: 50%;
  border: 6px solid #222;
  z-index: 2;
}

.pokeball-logo::after {
  content: '';
  position: absolute;
  top: calc(50% - 3px);
  left: 0; right: 0;
  height: 6px;
  background: #222;
}

@keyframes rotateBall {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.btn-google {
  background: white;
  color: #333;
  border: none;
  padding: 14px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }

/* ===== SETUP SCREEN ===== */
#setupScreen {
  display: none;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%);
  padding: 30px 20px;
  gap: 24px;
}

.setup-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 2.5vw, 20px);
  color: var(--yellow);
  text-align: center;
}

.setup-section {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 16px;
  padding: 20px;
  width: 100%;
  max-width: 680px;
}

.setup-section h3 {
  font-size: 18px;
  color: var(--yellow);
  margin-bottom: 16px;
  text-align: center;
}

.trainer-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.trainer-card {
  background: rgba(255,255,255,0.06);
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 12px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.trainer-card:hover { border-color: var(--yellow); background: rgba(245,197,24,0.1); }
.trainer-card.selected { border-color: var(--yellow); background: rgba(245,197,24,0.2); box-shadow: 0 0 16px rgba(245,197,24,0.3); }

.trainer-card img { width: 64px; height: 64px; image-rendering: pixelated; }
.trainer-card span { display: block; font-size: 13px; font-weight: 700; margin-top: 6px; }

.starter-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.starter-card {
  background: rgba(255,255,255,0.06);
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 12px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.starter-card:hover { border-color: var(--blue); background: rgba(42,117,187,0.1); }
.starter-card.selected { border-color: var(--blue); background: rgba(42,117,187,0.2); box-shadow: 0 0 16px rgba(42,117,187,0.3); }

.starter-card img { width: 72px; height: 72px; image-rendering: pixelated; }
.starter-card .s-name { font-size: 12px; font-weight: 700; margin-top: 4px; }
.starter-card .s-type { font-size: 11px; color: var(--text-muted); }

.btn-start {
  background: linear-gradient(135deg, var(--red), var(--dark-red));
  color: white;
  border: none;
  padding: 16px 48px;
  border-radius: 50px;
  font-size: 18px;
  font-family: 'Heebo', sans-serif;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(227,53,13,0.4);
  transition: all 0.2s;
  letter-spacing: 1px;
}

.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(227,53,13,0.6); }
.btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ===== MAIN GAME SCREEN ===== */
#gameScreen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
}

/* TOP BAR */
.top-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--panel-border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 1.5vw, 13px);
  color: var(--yellow);
}

.trainer-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.trainer-avatar-small {
  width: 40px; height: 40px;
  image-rendering: pixelated;
  border-radius: 50%;
  border: 2px solid var(--yellow);
}

.trainer-name-display { font-size: 14px; font-weight: 700; }

.gym-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--yellow);
}

.top-bar-actions {
  display: flex;
  gap: 8px;
}

.btn-small {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid var(--panel-border);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-small:hover { background: rgba(255,255,255,0.2); }

/* WORLD MAP */
.world-container {
  flex: 1;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 4px;
}

.world-map {
  position: relative;
  width: 100%;
  max-width: 100%;
}

.map-bg {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
  box-shadow: var(--shadow);
}

.zone-grid {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
}

.zone {
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  border-radius: 4px;
}

.zone:hover { background: rgba(255,255,255,0.12); }
.zone:active { background: rgba(255,255,255,0.22); }

.zone-label {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: white;
  font-size: clamp(10px, 1.5vw, 14px);
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 10px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}

.zone:hover .zone-label { opacity: 1; }

/* TEAM PANEL */
.team-panel {
  background: var(--panel);
  border-top: 1px solid var(--panel-border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.team-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--yellow);
  white-space: nowrap;
}

.team-slots {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.team-slot {
  width: 52px; height: 52px;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: visible;
}

.team-slot:hover { border-color: var(--yellow); }
.team-slot img { width: 44px; height: 44px; image-rendering: pixelated; }
.team-slot .slot-hp-bar {
  position: absolute;
  bottom: -4px;
  left: 2px; right: 2px;
  height: 3px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  overflow: hidden;
}
.team-slot .slot-hp-fill {
  height: 100%;
  background: var(--hp-high);
  border-radius: 2px;
  transition: width 0.3s;
}

.team-slot .slot-level {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--dark);
  color: var(--yellow);
  font-size: 9px;
  font-weight: 900;
  padding: 1px 4px;
  border-radius: 6px;
  border: 1px solid var(--yellow);
}

.bottom-bar {
  background: var(--panel);
  border-top: 1px solid var(--panel-border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.pokeball-counter {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
}

.pokeball-icon {
  width: 24px; height: 24px;
  background: linear-gradient(180deg, var(--red) 50%, white 50%);
  border-radius: 50%;
  border: 2px solid #444;
  position: relative;
  display: inline-block;
}

.btn-gym {
  background: linear-gradient(135deg, #7b2d8b, #4a1a6e);
  color: white;
  border: none;
  padding: 10px 22px;
  border-radius: 20px;
  font-size: 14px;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(123,45,139,0.4);
  transition: all 0.2s;
}

.btn-gym:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123,45,139,0.6); }

/* ===== OVERLAYS ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 16px;
  display: none;
}

.overlay.active { display: flex; }

/* ===== BATTLE SCREEN ===== */
#battleOverlay {
  background: radial-gradient(ellipse, #1a2a1a 0%, #0a0a0a 100%);
}

.battle-container {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.battle-field {
  background: linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 40%, #3a2a1a 40%, #2a1a0a 100%);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  min-height: 200px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

.battle-pokemon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.battle-pokemon img {
  width: clamp(80px, 15vw, 130px);
  height: clamp(80px, 15vw, 130px);
  image-rendering: pixelated;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
}

.battle-pokemon.enemy img { transform: scaleX(-1); }

.battle-hp-block {
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
  padding: 8px 12px;
  min-width: 140px;
  border: 1px solid rgba(255,255,255,0.1);
}

.battle-hp-name { font-size: 13px; font-weight: 700; }
.battle-hp-level { font-size: 11px; color: var(--text-muted); }

.battle-hp-bar-wrap {
  margin-top: 6px;
  height: 8px;
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  overflow: hidden;
}

.battle-hp-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease, background 0.4s;
}

.battle-log {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 12px;
  padding: 14px 16px;
  min-height: 64px;
  font-size: 15px;
  line-height: 1.5;
}

.battle-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-battle {
  padding: 13px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-battle:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-battle:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-attack { background: linear-gradient(135deg, #e3350d, #9b1a00); color: white; }
.btn-special { background: linear-gradient(135deg, #2a75bb, #1a4a80); color: white; }
.btn-run { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
.btn-catch { background: linear-gradient(135deg, var(--yellow), #c49a00); color: #222; }
.btn-release { background: linear-gradient(135deg, #4caf50, #2e7d32); color: white; }

/* ===== POKEMON CARD POPUP ===== */
.pokemon-card-popup {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  max-width: 340px;
  width: 100%;
  box-shadow: var(--shadow);
  position: relative;
}

.card-close {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-sprite { text-align: center; margin-bottom: 12px; }
.card-sprite img { width: 100px; height: 100px; image-rendering: pixelated; }

.card-name {
  text-align: center;
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 8px;
}

.card-types {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.type-badge {
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}

.card-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.stat-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-label { font-size: 11px; color: var(--text-muted); }
.stat-value { font-size: 15px; font-weight: 700; }

.stat-bar-wrap {
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 2px;
}

.stat-bar-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 2px;
}

.xp-row {
  margin-bottom: 14px;
}

.xp-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.xp-bar-wrap { height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
.xp-bar-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ffa500); border-radius: 4px; transition: width 0.3s; }

.card-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card-actions .btn-battle { width: 100%; }

/* ===== PC STORAGE OVERLAY ===== */
.pc-container {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  max-width: 680px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  position: relative;
}

.pc-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--yellow);
  margin-bottom: 20px;
  text-align: center;
}

.pc-close {
  position: absolute;
  top: 16px;
  left: 16px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
}

.pc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 10px;
}

.pc-pokemon-item {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.pc-pokemon-item:hover { border-color: var(--blue); background: rgba(42,117,187,0.1); }
.pc-pokemon-item img { width: 56px; height: 56px; image-rendering: pixelated; }
.pc-pokemon-item .pc-name { font-size: 11px; font-weight: 700; margin-top: 4px; }
.pc-pokemon-item .pc-level { font-size: 10px; color: var(--text-muted); }

/* ===== GYM SCREEN ===== */
.gym-container {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  max-width: 500px;
  width: 100%;
  box-shadow: var(--shadow);
}

.gym-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: #d070ff;
  text-align: center;
  margin-bottom: 8px;
}

.gym-subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }

.gym-leader-info {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 20px;
}

.gym-leader-sprite { font-size: 48px; }
.gym-leader-name { font-size: 18px; font-weight: 900; }
.gym-leader-type { font-size: 13px; color: var(--text-muted); }

.gym-team-preview {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 20px;
}

.gym-poke-badge {
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
}

.gym-actions { display: flex; gap: 10px; flex-direction: column; }

/* ===== ENCOUNTER RESULT ===== */
.encounter-result {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow);
}

.encounter-result h2 { font-size: 22px; font-weight: 900; margin-bottom: 16px; color: var(--yellow); }

/* ===== NOTIFICATION TOAST ===== */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(20,20,40,0.95);
  border: 1px solid var(--panel-border);
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 700;
  z-index: 9999;
  transition: transform 0.3s;
  text-align: center;
  max-width: 90vw;
  pointer-events: none;
}

#toast.show { transform: translateX(-50%) translateY(0); }

/* ===== EVOLUTION OVERLAY ===== */
#evolutionOverlay {
  background: radial-gradient(ellipse, #1a1a4e 0%, #0a0a1a 100%);
}

.evolution-container {
  text-align: center;
  padding: 40px 20px;
}

.evolution-container h2 {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 2.5vw, 18px);
  color: var(--yellow);
  margin-bottom: 30px;
}

.evolution-imgs {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 30px;
}

// ===== POKEAPI =====
async function fetchPokemon(idOrName) {
  const key = String(idOrName).toLowerCase();
  if (pokeCache[key]) return pokeCache[key];
  const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${key}`);
  const data = await res.json();
  pokeCache[key] = data;
  return data;
}

async function fetchEvolutionChain(pokemonId) {
  const speciesRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${pokemonId}`);
  const species = await speciesRes.json();
  const chainRes = await fetch(species.evolution_chain.url);
  const chain = await chainRes.json();
  return chain;
}

function makePokemon(apiData, level) {
  const baseStats = {};
  apiData.stats.forEach(s => { baseStats[s.stat.name] = s.base_stat; });
  const mult = 1 + (level - 1) * 0.01;
  const types = apiData.types.map(t => t.type.name);
  const maxHP = Math.floor((baseStats['hp'] || 45) * mult);
  return {
    id: apiData.id,
    name: apiData.name,
    types,
    level,
    xp: xpForLevel(level),
    maxHP,
    currentHP: maxHP,
    attack: Math.floor((baseStats['attack'] || 50) * mult),
    defense: Math.floor((baseStats['defense'] || 50) * mult),
    spAttack: Math.floor((baseStats['special-attack'] || 50) * mult),
    spDefense: Math.floor((baseStats['special-defense'] || 50) * mult),
    sprite: apiData.sprites.front_default,
    backSprite: apiData.sprites.back_default || apiData.sprites.front_default,
    uid: Date.now() + Math.random()
  };
}

// ===== ZONE CLICK =====
const ORDERED_ZONES = [
  ZONES[0], ZONES[1], ZONES[2],
  ZONES[3], ZONES[4], ZONES[5],
  ZONES[6], ZONES[7], ZONES[8]
];

async function clickZone(idx) {
  if (battleState) return;
  const zone = ORDERED_ZONES[idx];

  // 1% chance for Pokeball drop
  if (Math.random() < 0.01) {
    G.pokeballs++;
    updateTopBar();
    saveGame();
    showToast('🎉 מצאת כדור פוקימון! (יש לך ' + G.pokeballs + ')');
    return;
  }

  const poke = spawnPokemon(zone.types);
  if (!poke) { showToast('אין פוקימונים באזור הזה כרגע...'); return; }

  showToast(`${zone.emoji} ${zone.name}: ${poke.name} הופיע!`);

  try {
    const apiData = await fetchPokemon(poke.id);
    const level = randomEncounterLevel();
    const enemy = makePokemon(apiData, level);
    startWildBattle(enemy);
  } catch(e) {
    showToast('שגיאה בטעינת פוקימון, נסה שוב');
  }
}

function spawnPokemon(zoneTypes) {
  let pool = [];
  zoneTypes.forEach(t => {
    const list = BASE_POKEMON_BY_TYPE[t] || [];
    list.forEach(p => { if (!pool.find(x => x.id === p.id)) pool.push(p); });
  });
  if (!pool.length) return null;

  // Weighted random by rarity
  const weighted = [];
  pool.forEach(p => {
    const w = p.rarity === 'common' ? 70 : p.rarity === 'rare' ? 25 : 5;
    for (let i = 0; i < w; i++) weighted.push(p);
  });

  return weighted[Math.floor(Math.random() * weighted.length)];
}

function randomEncounterLevel() {
  const minLvl = G.gymProgress === 0 ? 1 : GYM_LEVELS[G.gymProgress - 1];
  const maxLvl = GYM_LEVELS[Math.min(G.gymProgress, 7)];
  return Math.floor(Math.random() * (maxLvl - minLvl + 1)) + minLvl;
}

function startWildBattle(enemy) {

function updateBattleHP(side, poke) {
  const bar = document.getElementById(`battle${side === 'player' ? 'Player' : 'Enemy'}HPBar`);

  const pct = Math.max(0, poke.currentHP / poke.maxHP * 100);
  bar.style.width = pct + '%';
  bar.style.background = pct > 50 ? '#4caf50' : pct > 25 ? '#ff9800' : '#f44336';
  if (num) num.textContent = `${Math.max(0, poke.currentHP)}/${poke.maxHP}`;

const TYPE_CHART = {
  fire:     { grass:2, ice:2, bug:2, steel:2, water:0.5, fire:0.5, rock:0.5, dragon:0.5 },
  water:    { fire:2, ground:2, rock:2, water:0.5, grass:0.5, dragon:0.5 },
  grass:    { water:2, ground:2, rock:2, fire:0.5, grass:0.5, poison:0.5, flying:0.5, bug:0.5, dragon:0.5, steel:0.5 },
  electric: { water:2, flying:2, grass:0.5, electric:0.5, dragon:0.5, ground:0 },

  poison:   { grass:2, fairy:2, poison:0.5, ground:0.5, rock:0.5, ghost:0.5, steel:0 },
  ground:   { fire:2, electric:2, poison:2, rock:2, steel:2, grass:0.5, bug:0.5, flying:0 },
  flying:   { grass:2, fighting:2, bug:2, electric:0.5, rock:0.5, steel:0.5 },
  psychic:  { fighting:2, poison:2, psychic:0.5, steel:0.5, dark:0 },
  bug:      { grass:2, psychic:2, dark:2, fire:0.5, fighting:0.5, flying:0.5, ghost:0.5, steel:0.5, fairy:0.5 },

  steel:    { ice:2, rock:2, fairy:2, fire:0.5, water:0.5, electric:0.5, steel:0.5 },
  fairy:    { fighting:2, dragon:2, dark:2, fire:0.5, poison:0.5, steel:0.5 },
  normal:   {}
};

function getTypeMultiplier(attackerTypes, defenderTypes) {
  let mult = 1;
  (attackerTypes || []).forEach(atk => {
    (defenderTypes || []).forEach(def => {
      const val = (TYPE_CHART[atk] || {})[def];
      if (val !== undefined) mult *= val;
    });
  });
  return mult;
}

function typeEffectivenessText(mult) {
  if (mult >= 4) return ' 💥 יעיל ביותר!';
  if (mult >= 2) return ' ⚡ יעיל מאוד!';
  if (mult === 0) return ' 🚫 לא השפיע!';
  if (mult < 1) return ' 😐 לא יעיל במיוחד';
  return '';
}

function calcDamage(attacker, defender, type) {
  const atk = type === 'physical' ? attacker.attack : attacker.spAttack;
  const def = type === 'physical' ? defender.defense : defender.spDefense;
  const base = Math.max(1, atk - def);
  const factor = 0.8 + Math.random() * 0.4;
  const typeMult = getTypeMultiplier(attacker.types || [], defender.types || []);
  return { dmg: Math.max(1, Math.floor(base * factor * typeMult)), mult: typeMult };
}

async function playerAttack(type) {
  if (!battleState) return;
  setBattleButtonsEnabled(false);

  const player = getActivePokemon();
  if (!player) return;
  const enemy = battleState.enemy;

  // Player attacks
  const result = calcDamage(player, enemy, type);
  const dmg = result.dmg;
  enemy.currentHP = Math.max(0, enemy.currentHP - dmg);
  const atkName = type === 'physical' ? 'התקפה' : 'התקפה מיוחדת';
  setBattleLog(`${player.name} השתמש ב${atkName}! גרם ${dmg} נזק!${typeEffectivenessText(result.mult)}`);
  updateBattleHP('enemy', enemy);
  shakeSprite('battleEnemySprite');

  await sleep(900);

  if (enemy.currentHP <= 0) {
    setBattleLog(`${enemy.name} עולף! 🎉`);
    await sleep(700);
    if (battleState.isGym) {
      handleGymEnemyFainted();
    } else {
      showPostBattleActions();
    }
    return;
  }

  // Enemy attacks — choose best move considering type effectiveness
  const physResult = calcDamage(enemy, player, 'physical');
  const specResult = calcDamage(enemy, player, 'special');
  const eAtk = physResult.dmg >= specResult.dmg ? 'physical' : 'special';
  const eResult = eAtk === 'physical' ? physResult : specResult;
  const eDmg = eResult.dmg;
  player.currentHP = Math.max(0, player.currentHP - eDmg);

  setBattleLog(`${enemy.name} תקף! גרם ${eDmg} נזק!${typeEffectivenessText(eResult.mult)}`);
  updateBattleHP('player', player);
  shakeSprite('battlePlayerSprite');

  await sleep(700);

  if (player.currentHP <= 0) {
    setBattleLog(`${player.name} עולף! 😞`);
    await sleep(700);
    // Try next Pokémon
    const next = G.team.find(p => p.currentHP > 0 && p !== player);
    if (next) {
      setBattleLog(`${next.name} נכנס לקרב!`);
      await sleep(600);
      document.getElementById('battlePlayerSprite').src = next.backSprite || next.sprite;
      document.getElementById('battlePlayerName').textContent = next.name;
      document.getElementById('battlePlayerLevel').textContent = 'רמה ' + next.level;
      updateBattleHP('player', next);
      updateTeamPanel();
      setBattleButtonsEnabled(true);
    } else {
      setBattleLog('כל הפוקימונים שלך עולפו! 😢 מתרפאים...');
      healAllPokemon();
      saveGame();
      await sleep(1500);
      closeAllOverlays();
      updateTeamPanel();
      showToast('💊 כל הפוקימונים התרפאו! המשך לשחק');
    }
  } else {
    updateTeamPanel();
    setBattleButtonsEnabled(true);
  }
  saveGame();
}

function showPostBattleActions() {
  document.getElementById('battleActions').classList.add('hidden');
  document.getElementById('postBattleActions').classList.remove('hidden');
  const btn = document.getElementById('btnCatch');
  if (G.pokeballs <= 0) {
    btn.disabled = true;
    btn.textContent = '⚾ אין כדורים';
  } else {
    btn.disabled = false;
    btn.textContent = `⚾ תפוס! (${G.pokeballs} כדורים)`;
  }
  catchAttempts = 0;
}

async function tryToCatch() {
  if (!battleState || G.pokeballs <= 0) return;
  G.pokeballs--;
  updateTopBar();
  catchAttempts++;

  const success = Math.random() < 0.5;
  if (success) {
    setBattleLog(`✅ ${battleState.enemy.name} נתפס!`);
    addToTeamOrPC(battleState.enemy);
    healAllPokemon();
    saveGame();
    await sleep(1000);
    closeAllOverlays();
    updateTeamPanel();
    showToast(`${battleState.enemy.name} נוסף לקבוצה שלך!`);
    battleState = null;
  } else {
    if (catchAttempts >= 2) {
      setBattleLog(`❌ ${battleState.enemy.name} ברח!`);
      healAllPokemon();
      saveGame();
      await sleep(1000);
      closeAllOverlays();
      battleState = null;
    } else {
      setBattleLog(`❌ ${battleState.enemy.name} נמלט מהכדור! ניסיון אחרון.`);
      document.getElementById('btnCatch').textContent = `⚾ נסה שוב! (${G.pokeballs} כדורים)`;
      if (G.pokeballs <= 0) document.getElementById('btnCatch').disabled = true;
    }
  }
}

function releaseForXP() {
  if (!battleState) return;
  const enemy = battleState.enemy;
  const xpGain = enemy.attack + enemy.spAttack;
  const active = getActivePokemon();

  G.team.forEach(p => {
    if (p.currentHP <= 0) return;
    const gain = p === active ? Math.floor(xpGain * 0.5) : Math.floor(xpGain * 0.5 / Math.max(1, G.team.filter(x => x.currentHP > 0).length - 1));
    giveXP(p, gain);
  });

  setBattleLog(`${enemy.name} שוחרר. קיבלת ${xpGain} נקודות ניסיון! 🌟`);
  healAllPokemon();
  saveGame();

  setTimeout(() => {
    closeAllOverlays();
    updateTeamPanel();
    battleState = null;
    checkEvolutions();
  }, 1200);
}

function healAllPokemon() {
  G.team.forEach(p => { p.currentHP = p.maxHP; });
  G.pc.forEach(p => { p.currentHP = p.maxHP; });
}

function runFromBattle() {
  setBattleLog('ברחת מהקרב!');
  setTimeout(() => { closeAllOverlays(); battleState = null; }, 800);
}

function switchPokemonInBattle() {
  const alive = G.team.filter(p => p.currentHP > 0);
  if (alive.length <= 1) { showToast('אין פוקימונים אחרים זמינים'); return; }

  // Simple: show inline options
  const opts = alive.filter(p => p !== getActivePokemon());
  const names = opts.map((p, i) => `[${i+1}] ${p.name} (רמה ${p.level})`).join('\n');
  const choice = prompt('בחר פוקימון:\n' + names + '\n\nהזן מספר:');
  const idx = parseInt(choice) - 1;
  if (idx >= 0 && idx < opts.length) {
    const chosen = opts[idx];
    document.getElementById('battlePlayerSprite').src = chosen.backSprite || chosen.sprite;
    document.getElementById('battlePlayerName').textContent = chosen.name;
    document.getElementById('battlePlayerLevel').textContent = 'רמה ' + chosen.level;
    updateBattleHP('player', chosen);
    setBattleLog(`${chosen.name} נכנס לקרב!`);
  }
}

async function startGymBattle() {
  closeOverlay('gymOverlay');
  const gymIdx = G.gymProgress;
  const leader = GYM_LEADERS[gymIdx];
  const gymLevel = GYM_LEVELS[gymIdx];

  // Build gym team
  const gymTeam = [];
  for (const pname of leader.pokemon) {
    try {
      const apiData = await fetchPokemon(pname);
      gymTeam.push(makePokemon(apiData, gymLevel));
    } catch(e) {}
  }

  if (!gymTeam.length) { showToast('שגיאה בטעינת ג\'ים'); return; }

  const active = getActivePokemon();
  if (!active) { showToast('כל הפוקימונים שלך עולפו!'); return; }

  battleState = {
    enemy: gymTeam[0],
    isGym: true,
    gymIndex: gymIdx,
    gymPokeIndex: 0,
    enemyTeam: gymTeam,
    catchAttempts: 0
  };

  setupBattleUI(active, gymTeam[0]);
  showOverlay('battleOverlay');
  document.getElementById('battleActions').classList.remove('hidden');
  document.getElementById('postBattleActions').classList.add('hidden');
  setBattleLog(`קרב ג'ים נגד ${leader.name}! ${gymTeam[0].name} הופיע!`);
}

async function handleGymEnemyFainted() {
  const bs = battleState;
  bs.gymPokeIndex++;

  if (bs.gymPokeIndex >= bs.enemyTeam.length) {
    // Won the gym!
    G.gymProgress++;
    G.badges++;
    updateTopBar();
    saveGame();
    setBattleLog(`🏆 ניצחת את הג'ים! קיבלת את התג! 💊 הקבוצה התרפאה!`);
    healAllPokemon();
    
    // Give XP to team
    const xpGain = 200 * bs.gymIndex;
    G.team.forEach(p => { if (p.currentHP > 0) giveXP(p, xpGain); });
    
    await sleep(1500);
    closeAllOverlays();
    updateTeamPanel();
    showToast(`🏅 קיבלת תג ג'ים! (${G.badges}/8)`);
    battleState = null;
    checkEvolutions();
  } else {
    const nextEnemy = bs.enemyTeam[bs.gymPokeIndex];
    bs.enemy = nextEnemy;
    setBattleLog(`${GYM_LEADERS[bs.gymIndex].name} שלח את ${nextEnemy.name}!`);
    await sleep(600);
    document.getElementById('battleEnemySprite').src = nextEnemy.sprite;
    document.getElementById('battleEnemyName').textContent = nextEnemy.name;
    document.getElementById('battleEnemyLevel').textContent = 'רמה ' + nextEnemy.level;
    updateBattleHP('enemy', nextEnemy);
    setBattleButtonsEnabled(true);
  }
}

// ===== XP & LEVELING =====
function giveXP(poke, amount) {
  poke.xp = (poke.xp || 0) + amount;
  const maxGymLevel = GYM_LEVELS[Math.min(G.gymProgress, 7)];

  while (poke.level < maxGymLevel) {
    const needed = xpForLevel(poke.level + 1);
    if (poke.xp >= needed) {
      poke.level++;
      recalcStats(poke);
    } else break;
  }
}

function recalcStats(poke) {
  const mult = 1 + (poke.level - 1) * 0.01;
  const cached = pokeCache[String(poke.id)];
  if (!cached) return;
  const baseStats = {};
  cached.stats.forEach(s => { baseStats[s.stat.name] = s.base_stat; });
  poke.maxHP = Math.floor((baseStats['hp'] || 45) * mult);
  poke.currentHP = Math.min(poke.currentHP, poke.maxHP);
  poke.attack = Math.floor((baseStats['attack'] || 50) * mult);
  poke.defense = Math.floor((baseStats['defense'] || 50) * mult);
  poke.spAttack = Math.floor((baseStats['special-attack'] || 50) * mult);
  poke.spDefense = Math.floor((baseStats['special-defense'] || 50) * mult);
}

// ===== EVOLUTION =====
async function checkEvolutions() {
  for (const poke of G.team) {
    await tryEvolve(poke);
  }
}

async function tryEvolve(poke) {
  try {
    const chainData = await fetchEvolutionChain(poke.id);
    const evo = findNextEvolution(chainData.chain, poke.id, poke.level);
    if (evo) {
      await doEvolve(poke, evo);
    }
  } catch(e) {}
}

function findNextEvolution(chain, currentId, level) {
  if (chain.species.url.includes('/' + currentId + '/')) {
    for (const evo of chain.evolves_to) {
      const detail = evo.evolution_details[0];
      if (detail && detail.trigger && detail.trigger.name === 'level-up') {
        const minLevel = detail.min_level || 1;
        if (level >= minLevel) {
          const evoId = parseInt(evo.species.url.split('/').slice(-2)[0]);
          return { id: evoId, name: evo.species.name, level: minLevel };
        }
      }
    }
  }
  for (const evo of chain.evolves_to) {
    const result = findNextEvolution(evo, currentId, level);
    if (result) return result;
  }
  return null;
}

async function doEvolve(poke, evoData) {
  const evoApiData = await fetchPokemon(evoData.id);
  const oldName = poke.name;
  const oldSprite = poke.sprite;
  const newSprite = evoApiData.sprites.front_default;

  // Show evolution screen
  const content = document.getElementById('evolutionContent');
  content.innerHTML = `
    <h2>✨ ${oldName} מתפתח! ✨</h2>
    <div class="evolution-imgs">
      <div class="evo-sprite"><img src="${oldSprite}" alt="${oldName}"></div>
      <div class="evo-arrow">→</div>
      <div class="evo-sprite"><img src="${newSprite}" alt="${evoData.name}"></div>
    </div>
    <div style="font-size:18px; color:var(--yellow); font-weight:900">${oldName} → ${evoData.name}!</div>`;

  showOverlay('evolutionOverlay');
  await sleep(3000);
  closeOverlay('evolutionOverlay');

  // Update poke data
  poke.id = evoData.id;
  poke.name = evoData.name;
  poke.sprite = newSprite;
  poke.backSprite = evoApiData.sprites.back_default || newSprite;
  poke.types = evoApiData.types.map(t => t.type.name);
  recalcStats(poke);
  saveGame();
  updateTeamPanel();
  showToast(`${oldName} התפתח ל-${evoData.name}! 🎉`);
}

// ===== TEAM & PC =====
function addToTeamOrPC(poke) {
  if (G.team.length < 6) G.team.push(poke);
  else G.pc.push(poke);
}

function updateTeamPanel() {
  const slots = document.getElementById('teamSlots');
  slots.innerHTML = '';
  G.team.forEach((p, i) => {
    const hpPct = p.maxHP > 0 ? Math.max(0, p.currentHP / p.maxHP * 100) : 0;
    const hpColor = hpPct > 50 ? '#4caf50' : hpPct > 25 ? '#ff9800' : '#f44336';
    const slot = document.createElement('div');
    slot.className = 'team-slot';
    slot.onclick = () => openPokeCard(i, 'team');
    slot.innerHTML = `
      <img src="${p.sprite}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/44/333/fff?text=?'">
      <div class="slot-level">L${p.level}</div>
      <div class="slot-hp-bar"><div class="slot-hp-fill" style="width:${hpPct}%; background:${hpColor}"></div></div>`;
    slots.appendChild(slot);
  });
}

function openPokeCard(index, source) {
  const poke = source === 'team' ? G.team[index] : G.pc[index];
  if (!poke) return;

  const xpCurrent = poke.xp || 0;
  const xpNext = xpForLevel(poke.level + 1);
  const xpPct = Math.min(100, (xpCurrent / xpNext) * 100);

  const typesBadges = poke.types.map(t =>
    `<span class="type-badge ${TYPE_COLORS[t] || ''}">${t}</span>`).join('');

  const stats = [
    { label: 'HP', val: poke.maxHP, max: 250 },
    { label: 'התקפה', val: poke.attack, max: 200 },
    { label: 'הגנה', val: poke.defense, max: 200 },
    { label: 'התק׳ מיוחדת', val: poke.spAttack, max: 200 },
    { label: 'הגנה מיוחדת', val: poke.spDefense, max: 200 }
  ];

  const statsHTML = stats.map(s => `
    <div class="stat-row">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.val}</div>
      <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${Math.min(100, s.val/s.max*100)}%"></div></div>
    </div>`).join('');

  const actions = source === 'team'
    ? `<button class="btn-battle btn-run" onclick="moveToPc(${index}); closeOverlay('pokeCardOverlay')">📦 העבר ל-PC</button>`
    : `<button class="btn-battle btn-special" onclick="moveToTeam(${index}); closeOverlay('pokeCardOverlay')" ${G.team.length >= 6 ? 'disabled title="הקבוצה מלאה"' : ''}>➕ הוסף לקבוצה</button>`;

  document.getElementById('pokeCardContent').innerHTML = `
    <button class="card-close" onclick="closeOverlay('pokeCardOverlay')">✕</button>
    <div class="card-sprite"><img src="${poke.sprite}" alt="${poke.name}"></div>
    <div class="card-name">${poke.name}</div>
    <div class="card-types">${typesBadges}</div>
    <div style="text-align:center; font-size:13px; color:var(--text-muted); margin-bottom:12px">רמה ${poke.level}</div>
    <div class="xp-row">
      <div class="xp-label">XP: ${xpCurrent} / ${xpNext}</div>
      <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
    </div>
    <div class="card-stats">${statsHTML}</div>
    <div class="card-actions">${actions}
      <button class="btn-battle btn-run" onclick="closeOverlay('pokeCardOverlay')">סגור</button>
    </div>`;

  showOverlay('pokeCardOverlay');
}

function moveToPc(teamIndex) {
  if (G.team.length <= 1) { showToast('חייב להיות לך לפחות פוקימון אחד בקבוצה!'); return; }
  const poke = G.team.splice(teamIndex, 1)[0];
  G.pc.push(poke);
  updateTeamPanel();
  saveGame();
  showToast(`${poke.name} הועבר ל-PC`);
}

function moveToTeam(pcIndex) {
  if (G.team.length >= 6) { showToast('הקבוצה מלאה! העבר פוקימון ל-PC קודם'); return; }
  const poke = G.pc.splice(pcIndex, 1)[0];
  G.team.push(poke);
  updateTeamPanel();
  saveGame();
  showToast(`${poke.name} הוסף לקבוצה!`);
}

function openPC() {
  const grid = document.getElementById('pcGrid');
  const empty = document.getElementById('pcEmpty');
  grid.innerHTML = '';

  if (!G.pc.length) {
    empty.style.display = 'block';
    grid.style.display = 'none';
  } else {
    empty.style.display = 'none';
    grid.style.display = 'grid';
    G.pc.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'pc-pokemon-item';
      el.onclick = () => openPokeCard(i, 'pc');
      el.innerHTML = `
        <img src="${p.sprite}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/56/333/fff?text=?'">
        <div class="pc-name">${p.name}</div>
        <div class="pc-level">רמה ${p.level}</div>`;
      grid.appendChild(el);
    });
  }
  showOverlay('pcOverlay');
}

function closePC() { closeOverlay('pcOverlay'); }

// ===== UTILS =====
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showScreen(name) {
  document.getElementById('authScreen').style.display = name === 'auth' ? 'flex' : 'none';
  document.getElementById('setupScreen').style.display = name === 'setup' ? 'flex' : 'none';
  document.getElementById('gameScreen').style.display = name === 'game' ? 'flex' : 'none';
}

function showOverlay(id) {
  document.getElementById(id).classList.add('active');
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('active');
}

function closeAllOverlays() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2800);
}

function shakeSprite(id) {
  const el = document.getElementById(id);
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 400);
}

// Initial screen
showScreen('auth');
</script>
